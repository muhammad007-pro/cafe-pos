<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PremiumPOS - Yuklanmoqda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        .loading-container {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 2rem;
            animation: pulse 2s infinite;
        }
        
        .logo svg {
            width: 100%;
            height: 100%;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #c9a84c 0%, #e2c97a 50%, #c9a84c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            color: #7a7a99;
            margin-bottom: 2rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #c9a84c, #e2c97a);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .status {
            font-size: 0.875rem;
            color: #9a9ab8;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(201, 168, 76, 0.2);
            border-top-color: #c9a84c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="logo">
            <svg viewBox="0 0 100 100" fill="none">
                <circle cx="50" cy="50" r="45" stroke="url(#gradient)" stroke-width="4"/>
                <path d="M30 40h40M30 50h40M30 60h30" stroke="url(#gradient)" stroke-width="4" stroke-linecap="round"/>
                <defs>
                    <linearGradient id="gradient" x1="0" y1="0" x2="100" y2="100">
                        <stop offset="0%" stop-color="#c9a84c"/>
                        <stop offset="50%" stop-color="#e2c97a"/>
                        <stop offset="100%" stop-color="#c9a84c"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        
        <h1>PremiumPOS</h1>
        <p>Restoran boshqaruv tizimi</p>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        
        <div class="status">
            <span class="spinner"></span>
            <span id="status">Backend server ishga tushirilmoqda...</span>
        </div>
    </div>
</body>
</html>
