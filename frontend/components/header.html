<!-- Header komponenti -->
<header class="app-header glass">
    <div class="header-left">
        <button class="mobile-menu-toggle btn-icon glass" id="mobileMenuToggle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        
        <div class="page-title">
            <h1 id="pageTitle">Dashboard</h1>
            <nav class="breadcrumb">
                <a href="../index.html">Bosh sahifa</a>
                <span>/</span>
                <span id="breadcrumbCurrent">Dashboard</span>
            </nav>
        </div>
    </div>
    
    <div class="header-center">
        <div class="search-wrapper">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input type="search" id="globalSearch" placeholder="Qidirish... (Ctrl+K)" class="search-input">
            <kbd class="search-shortcut">⌘K</kbd>
        </div>
    </div>
    
    <div class="header-right">
        <div class="date-display glass" id="currentDate">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
                <path d="M3 10h18M8 2v4M16 2v4" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span id="dateText"></span>
        </div>
        
        <button class="btn-icon glass notification-btn" id="notificationBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span class="notification-badge" style="display: none;">0</span>
        </button>
        
        <button class="btn-icon glass" id="themeToggle">
            <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="5" fill="currentColor"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2"/>
            </svg>
            <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" style="display: none;">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"/>
            </svg>
        </button>
        
        <button class="btn-icon glass" id="refreshBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M23 4v6h-6M1 20v-6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
    </div>
</header>
